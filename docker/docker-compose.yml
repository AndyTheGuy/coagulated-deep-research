services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    restart: always

  freellmapi:
    image: ghcr.io/tashfeenahmed/freellmapi:latest
    container_name: freellmapi
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST_BIND=0.0.0.0
      - ENCRYPTION_KEY=${FREE_LLM_API_ENCRYPTION_KEY}
    volumes:
      - freellmapi_data:/app/server/data
    restart: always

volumes:
  freellmapi_data:
